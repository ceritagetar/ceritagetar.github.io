name: Fetch Blogger Posts

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'  # setiap hari pukul 00:00 UTC

jobs:
  fetch-posts:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install requests

    - name: Run fetch_blogger.py
      env:
        BLOGGER_API_KEY: ${{ secrets.BLOGGER_API_KEY }}
        BLOG_ID: ${{ secrets.BLOG_ID }}
      run: python fetch_blogger.py

    - name: Commit and push changes
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add data/posts.json
        git commit -m "Update posts from Blogger" || echo "No changes"
        git push
