name: Build Blogger Blog

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'  # update tiap hari

jobs:
  build-blog:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install requests
      run: pip install requests

    - name: Run Python to generate HTML
      env:
        BLOGGER_API_KEY: ${{ secrets.BLOGGER_API_KEY }}
        BLOG_ID: ${{ secrets.BLOG_ID }}
      run: python fetch_blogger.py

    - name: Commit & Push
      run: |
        git config user.name github-actions
        git config user.email github-actions@github.com
        git add .
        git commit -m "Update blog HTML from Blogger" || echo "No changes"
        git push
