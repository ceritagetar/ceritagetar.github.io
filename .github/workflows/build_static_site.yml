name: Build Static Site from Blogger

on:
  workflow_dispatch: # Allows manual trigger from GitHub UI
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run Python script to generate site
        env:
          # Pastikan nama secrets ini sama persis dengan yang Anda buat di GitHub Secrets
          BLOGGER_API_KEY: ${{ secrets.BLOGGER_API_KEY }}
          BLOG_ID: ${{ secrets.BLOG_ID }}
        run: |
          # --- START PYTHON SCRIPT ---
          import os
          import requests
          import json
          from datetime import datetime
          import re

          API_KEY = os.getenv('BLOGGER_API_KEY')
          BLOG_ID = os.getenv('BLOG_ID')

          if not API_KEY or not BLOG_ID:
              print("Error: BLOGGER_API_KEY or BLOG_ID not set in environment variables.")
              exit(1)

          # Menambahkan parameter fetchBodies=true untuk memastikan konten penuh diambil
          # Menambahkan maxResults=100 untuk mengambil hingga 100 postingan
          BLOGGER_API_URL = f"https://www.googleapis.com/blogger/v3/blogs/{BLOG_ID}/posts?key={API_KEY}&fetchBodies=true&maxResults=100"

          print(f"Fetching posts from Blogger API for Blog ID: {BLOG_ID}")

          try:
              response = requests.get(BLOGGER_API_URL)
              response.raise_for_status() # Raise HTTPError for bad responses (4xx or 5xx)
              data = response.json()
          except requests.exceptions.RequestException as e:
              print(f"Error fetching data from Blogger API: {e}")
              exit(1)

          posts_data = data.get('items', [])

          # Create output directory for posts
          output_dir = "posts"
          if not os.path.exists(output_dir):
              os.makedirs(output_dir)

          # Helper function to create SEO-friendly URLs (slugify)
          def slugify(text):
              text = text.lower()
              text = re.sub(r'[^\w\s-]', '', text)
              text = re.sub(r'[\s_-]+', '-', text)
              text = text.strip('-')
              return text

          homepage_snippets = []

          for post in posts_data:
              title = post.get('title', 'No Title')
              published_date_str = post.get('published', '')
              post_content_html = post.get('content', '') # Full HTML content
              
              # Extract snippet for homepage (e.g., first 200 chars)
              # A more robust snippet extraction would parse HTML, but for simplicity, we truncate
              snippet = post_content_html[:200] + "..." if len(post_content_html) > 200 else post_content_html
              
              # Format date
              try:
                  published_date = datetime.fromisoformat(published_date_str.replace('Z', '+00:00'))
                  display_date = published_date.strftime('%d %B %Y')
              except ValueError:
                  display_date = published_date_str

              # Create URL slug for the post
              post_slug = slugify(title)
              detail_page_url = f"/{output_dir}/{post_slug}.html" # URL relative to site root

              # --- Generate HTML content for the detail page ---
              detail_html_content = f"""
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{title}</title>
    <style>
        body {{ font-family: Arial, sans-serif; line-height: 1.6; margin: 20px; max-width: 800px; margin-left: auto; margin-right: auto; }}
        h1 {{ color: #333; }}
        .post-meta {{ font-size: 0.9em; color: #666; margin-bottom: 20px; }}
        .post-content img {{ max-width: 100%; height: auto; display: block; margin: 10px auto; }}
        a {{ color: #007bff; text-decoration: none; }}
        a:hover {{ text-decoration: underline; }}
    </style>
</head>
<body>
    <header>
        <nav><a href="/">Home</a></nav>
        <h1>{title}</h1>
        <p class="post-meta">Published: {display_date}</p>
    </header>
    <main class="post-content">
        {post_content_html}
    </main>
    <footer>
        <p>&copy; {datetime.now().year} My Blogger Static Site. All rights reserved.</p>
    </footer>
</body>
</html>
"""
              # Save the detail HTML file
              detail_filename = f"{output_dir}/{post_slug}.html"
              try:
                  with open(detail_filename, 'w', encoding='utf-8') as f:
                      f.write(detail_html_content)
                  print(f"Generated detail page: {detail_filename}")
              except IOError as e:
                  print(f"Error saving detail page {detail_filename}: {e}")

              # Add snippet to the list for the homepage
              homepage_snippets.append(f"""
            <div class="post-snippet">
                <h2><a href="{detail_page_url}">{title}</a></h2>
                <p class="post-meta">Published: {display_date}</p>
                <p>{snippet} <a href="{detail_page_url}">Read More</a></p>
            </div>
            """)

          # --- Generate Homepage (index.html) ---
          homepage_content = "\n".join(homepage_snippets)

          current_year = datetime.now().year # Get current year for copyright

          index_html_content = f"""
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blog Homepage</title>
    <style>
        body {{ font-family: Arial, sans-serif; line-height: 1.6; margin: 20px; max-width: 800px; margin-left: auto; margin-right: auto; }}
        h1 {{ color: #333; }}
        .post-snippet {{ border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 20px; }}
        .post-snippet:last-child {{ border-bottom: none; }}
        .post-snippet h2 {{ margin-top: 0; }}
        .post-meta {{ font-size: 0.9em; color: #666; }}
        a {{ color: #007bff; text-decoration: none; }}
        a:hover {{ text-decoration: underline; }}
    </style>
</head>
<body>
    <header>
        <h1>Latest Blog Posts</h1>
    </header>
    <main>
        {homepage_content if homepage_content else "<p>No posts found.</p>"}
    </main>
    <footer>
        <p>&copy; {current_year} My Blogger Static Site. All rights reserved.</p>
    </footer>
</body>
</html>
"""
          # Save index.html
          try:
              with open("index.html", 'w', encoding='utf-8') as f:
                  f.write(index_html_content)
              print("Generated index.html")
          except IOError as e:
              print(f"Error saving index.html: {e}")

          print("Site generation complete.")
          # --- END PYTHON SCRIPT ---

      - name: Add and commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Tambahkan index.html dan folder posts ke staging
          git add index.html posts/ 
          # Hanya commit jika ada perubahan, mencegah action gagal jika tidak ada perubahan
          git commit -m "Automated: Update Blogger content" || echo "No changes to commit" 

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Pastikan branch ini adalah branch utama repositori Anda (biasanya 'main')
          branch: main
