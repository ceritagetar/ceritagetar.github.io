    <style id='global-styles-inline-css'>
        :root{

            --wp--preset--color--cyan-bluish-gray: #abb8c3;
            --wp--preset--color--white: #ffffff;
            /* ... (properti CSS lain yang relevan, saya singkat untuk contoh) ... */
        }
        body .is-layout-flex{display: flex;}
        .is-layout-flex{flex-wrap: wrap;align-items: center;}
        .is-layout-flex > :is(*, div){margin: 0;}
        body .is-layout-grid{display: grid;}
        .is-layout-grid > :is(*, div){margin: 0;}
        /* ... (lanjutan gaya global yang mungkin mempengaruhi layout atau warna) ... */

		.site-container .wp-block-button .wp-block-button__link.has-theme-primary-color,
		.site-container .wp-block-button.is-style-outline .wp-block-button__link.has-theme-primary-color {			color: #0073e5;		}
        /* ... (gaya Gutenberg lain yang mungkin tidak secara langsung terkait toggle, tapi bagian dari tema) ... */
