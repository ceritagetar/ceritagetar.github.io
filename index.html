<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu Hamburger</title>

    <link rel="stylesheet" href="https://temangabut.xyz/wp-includes/css/dashicons.min.css?ver=6.8.1" media="all" />

    <style>
        /* --- CSS dimulai di sini --- */

        /* Styling Dasar */
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: white;
            padding: 1rem;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 960px;
            margin: 0 auto;
        }

        .nav-menu {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex; /* Untuk desktop, menu tampil sejajar */
        }

        .nav-menu li a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            display: block;
        }

        .nav-menu li a:hover {
            background-color: #555;
        }

        /* Tombol Hamburger */
        .hamburger-button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 2rem; /* Ukuran ikon */
            color: white;
            display: none; /* Sembunyikan secara default di desktop */
            padding: 0;
            position: relative; /* Penting untuk pseudo-element */
            width: 48px; /* Ukuran tombol agar ikon terlihat */
            height: 48px;
            display: flex; /* Untuk menengahkan ikon */
            justify-content: center;
            align-items: center;
        }

        /* Ikon Default (Hamburger - \f333) */
        .hamburger-button::before {
            font-family: "dashicons"; /* Menggunakan font Dashicons */
            content: "\f333"; /* Karakter Unicode untuk ikon menu hamburger */
            display: block;
            line-height: 1; /* Pastikan ikon sejajar */
        }

        /* Ikon Saat Menu Terbuka (X - \f335) */
        .hamburger-button.is-active::before {
            content: "\f335"; /* Karakter Unicode untuk ikon 'X' */
        }


        /* Menu responsif untuk mobile */
        @media (max-width: 768px) {
            .hamburger-button {
                display: block; /* Tampilkan tombol hamburger di mobile */
            }

            .nav-menu {
                flex-direction: column;
                width: 100%;
                background-color: #444;
                position: absolute;
                top: 60px; /* Sesuaikan dengan tinggi header Anda */
                left: 0;
                transform: translateX(-100%); /* Sembunyikan menu di luar layar */
                transition: transform 0.3s ease-in-out;
                z-index: 1000;
            }

            .nav-menu.active {
                transform: translateX(0); /* Tampilkan menu */
            }

            .nav-menu li a {
                padding: 1rem;
                border-bottom: 1px solid #555;
            }

            .nav-menu li:last-child a {
                border-bottom: none;
            }
        }

        main {
            padding: 2rem;
            max-width: 960px;
            margin: 0 auto;
        }

        /* --- CSS berakhir di sini --- */
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
            <button class="hamburger-button" aria-expanded="false" aria-label="Toggle Menu">
                </button>
            <ul class="nav-menu">
                <li><a href="#">Beranda</a></li>
                <li><a href="#">Tentang Kami</a></li>
                <li><a href="#">Layanan</a></li>
                <li><a href="#">Kontak</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Menu Hamburger Bersih</h1>
        <p>Ini adalah contoh menu hamburger yang disederhanakan, fokus pada fungsionalitas toggle menu.</p>
    </main>

    <script>
        /* --- JavaScript dimulai di sini --- */

        document.addEventListener('DOMContentLoaded', function() {
            const hamburgerButton = document.querySelector('.hamburger-button');
            const navMenu = document.querySelector('.nav-menu');

            // Pastikan elemen ditemukan untuk menghindari error jika selektor salah
            if (!hamburgerButton || !navMenu) {
                console.warn("Elemen tombol hamburger atau menu navigasi tidak ditemukan. Pastikan selektor CSS sudah benar.");
                return;
            }

            hamburgerButton.addEventListener('click', function() {
                navMenu.classList.toggle('active'); // Mengubah visibilitas menu
                hamburgerButton.classList.toggle('is-active'); // Mengubah ikon tombol

                // Mengatur atribut ARIA untuk aksesibilitas
                if (navMenu.classList.contains('active')) {
                    hamburgerButton.setAttribute('aria-expanded', 'true');
                } else {
                    hamburgerButton.setAttribute('aria-expanded', 'false');
                }
            });

            // Opsional: Tutup menu ketika link di dalam menu diklik
            navMenu.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    if (navMenu.classList.contains('active')) { // Hanya tutup jika menu sedang aktif
                        navMenu.classList.remove('active');
                        hamburgerButton.classList.remove('is-active');
                        hamburgerButton.setAttribute('aria-expanded', 'false');
                    }
                });
            });
        });

        /* --- JavaScript berakhir di sini --- */
    </script>
</body>
</html>
